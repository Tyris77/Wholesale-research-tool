# Pin Node 20 — react-router 7 and the Vite/rolldown toolchain require >=20.
# Railway's default (Node 18) fails the frontend build. NIXPACKS_NODE_VERSION
# (plus .nvmrc and package.json "engines") selects Node 20 while leaving
# nixpacks' auto-detected build toolchain (needed to compile sqlite3) intact.
[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = ["npm install", "cd backend && npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node backend/src/server.js"
