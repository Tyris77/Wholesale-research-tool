# Railway sets NODE_ENV=production (needed for the Express static-serving at
# runtime), which makes `npm install` skip devDependencies. But tsc and vite —
# required to build the frontend — live in devDependencies. --include=dev
# installs them regardless of NODE_ENV, fixing "sh: tsc: not found" (exit 127).
[phases.install]
cmds = ["npm install --include=dev", "cd backend && npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node backend/src/server.js"
